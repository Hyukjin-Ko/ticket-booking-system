spring:
  application:
    name: harness-ticket
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticket}
    username: ${DB_USERNAME:ticket}
    password: ${DB_PASSWORD:ticket}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000ms
      lettuce:
        shutdown-timeout: 100ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

jwt:
  secret: ${JWT_SECRET}
  access-ttl-minutes: 15
  refresh-ttl-days: 14

queue:
  tick-interval-sec: 1
  admits-per-tick: 100

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [%X{requestId}]"
