spring:
  application:
    name: harness-ticket
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticket}
    username: ${DB_USERNAME:ticket}
    password: ${DB_PASSWORD:ticket}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000ms
      lettuce:
        shutdown-timeout: 100ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    level: "%5p [%X{requestId}]"
